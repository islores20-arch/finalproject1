<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flores Car Care Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#0b0b0b;
    color:white;
    overflow-x:hidden;
}

/* Background Glow */

.glow{
    position:fixed;
    width:600px;
    height:600px;
    background:rgba(255,0,0,0.12);
    filter:blur(150px);
    border-radius:50%;
    top:-200px;
    right:-150px;
    z-index:-1;
}

/* Header */

header{
    padding:25px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(10,10,10,0.8);

    position:sticky;
    top:0;

    backdrop-filter:blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
    font-size:30px;
    font-weight:700;
}

.logo span{
    color:#ff2d2d;
}

.tagline{
    color:#999;
    font-size:13px;
}

/* Container */

.container{
    width:90%;
    max-width:1400px;
    margin:40px auto;
}

/* Stats */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-bottom:25px;
}

.stat{
    background:#141414;
    padding:22px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.05);
    transition:0.3s;
}

.stat:hover{
    transform:translateY(-3px);
    border-color:#ff2d2d;
}

.stat h3{
    color:#999;
    font-size:13px;
}

.stat p{
    margin-top:10px;
    font-size:30px;
    font-weight:700;
}

/* Main Grid */

.mainGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* Cards */

.card{
    background:#141414;
    padding:24px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.05);
}

.card h2{
    margin-bottom:15px;
}

/* Inputs */

input,
select{
    width:100%;
    padding:14px;
    margin-top:10px;

    background:#1d1d1d;
    color:white;

    border:none;
    outline:none;

    border-radius:12px;

    transition:0.2s;
}

input:focus,
select:focus{
    border:1px solid #ff2d2d;
}

/* Buttons */

button{
    width:100%;
    padding:14px;
    margin-top:15px;

    border:none;
    border-radius:12px;

    background:linear-gradient(135deg,#ff1a1a,#b30000);

    color:white;

    font-weight:600;

    cursor:pointer;

    transition:0.25s;
}

button:hover{
    transform:translateY(-2px);
}

/* Garage */

.garage{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-top:15px;
}

.vehicleCard{
    background:#111;
    border-radius:16px;
    padding:18px;

    border:1px solid rgba(255,255,255,0.05);

    transition:0.3s;
}

.vehicleCard:hover{
    transform:translateY(-4px);
    border-color:#ff2d2d;
}

.vehicleCard h3{
    margin-bottom:8px;
}

.vehicleCard p{
    color:#aaa;
    font-size:14px;
    margin-top:6px;
}

/* Services */

.serviceCard{
    margin-top:15px;
    background:#111;
    border-radius:16px;
    padding:16px;

    border:1px solid rgba(255,255,255,0.05);
}

.progress{
    width:100%;
    height:8px;

    background:#222;

    border-radius:20px;

    overflow:hidden;

    margin-top:10px;
}

.progressFill{
    height:100%;
    background:linear-gradient(90deg,#ff1a1a,#ff6666);
}

/* Status Colors */

.good{
    color:#4dff91;
}

.warning{
    color:#ffd24d;
}

.bad{
    color:#ff4d4d;
}

/* Mobile */

@media(max-width:900px){

    .mainGrid{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="glow"></div>

<header>

    <div>

        <div class="logo">
            Flores <span>Car Care</span>
        </div>

        <div class="tagline">
            Never Miss Your Car's Care Appointment
        </div>

    </div>

</header>

<div class="container">

<!-- Stats -->

<div class="stats">

    <div class="stat">
        <h3>Total Vehicles</h3>
        <p id="vehicleCount">0</p>
    </div>

    <div class="stat">
        <h3>Total Services</h3>
        <p id="serviceCount">0</p>
    </div>

    <div class="stat">
        <h3>Garage Value</h3>
        <p id="garageValue">$0</p>
    </div>

</div>

<!-- Main Grid -->

<div class="mainGrid">

    <!-- Add Vehicle -->

    <div class="card">

        <h2>Add Vehicle</h2>

        <input
        type="text"
        id="make"
        placeholder="Vehicle Make">

        <input
        type="text"
        id="model"
        placeholder="Vehicle Model">

        <input
        type="number"
        id="year"
        placeholder="Vehicle Year">

        <input
        type="number"
        id="mileage"
        placeholder="Current Mileage">

        <button onclick="addVehicle()">
            Add Vehicle
        </button>

    </div>

    <!-- Add Maintenance -->

    <div class="card">

        <h2>Add Maintenance</h2>

        <select id="vehicleSelect">

            <option>Select Vehicle</option>

        </select>

        <select id="serviceType">

            <option>Oil Change</option>
            <option>Timing Belt</option>
            <option>Transmission Service</option>
            <option>Brake Service</option>
            <option>Spark Plugs</option>

        </select>

        <input
        type="number"
        id="currentMileage"
        placeholder="Current Mileage">

        <input
        type="number"
        id="lastServiceMileage"
        placeholder="Mileage At Last Service">

        <button onclick="addService()">
            Add Maintenance
        </button>

    </div>

</div>

<!-- Garage -->

<div class="card" style="margin-top:20px;">

    <h2>Your Garage</h2>

    <div class="garage" id="garage">

    </div>

</div>

<!-- Maintenance -->

<div class="card" style="margin-top:20px;">

    <h2>Maintenance Timeline</h2>

    <div id="serviceList">

    </div>

</div>

</div>

<script>

/* Totals */

let vehicleCount = 0;
let serviceCount = 0;
let totalGarageValue = 0;

/* Estimate Vehicle Value */

function estimateVehicleValue(make,year,mileage){

    let baseValue = 22000;

    const luxuryBrands = [
        "bmw",
        "audi",
        "acura",
        "lexus",
        "infiniti",
        "mercedes"
    ];

    if(
        luxuryBrands.includes(make.toLowerCase())
    ){
        baseValue += 8000;
    }

    let age = 2026 - year;

    baseValue -= age * 1200;

    baseValue -= mileage * 0.05;

    if(baseValue < 2500){
        baseValue = 2500;
    }

    return Math.round(baseValue);

}

/* Add Vehicle */

function addVehicle(){

    let make =
    document.getElementById("make").value.trim();

    let model =
    document.getElementById("model").value.trim();

    let year =
    parseInt(
        document.getElementById("year").value
    );

    let mileage =
    parseInt(
        document.getElementById("mileage").value
    );

    if(
        make === "" ||
        model === "" ||
        isNaN(year) ||
        isNaN(mileage)
    ){

        alert("Please fill out all fields.");

        return;

    }

    /* Estimate Value */

    let estimatedValue =
    estimateVehicleValue(
        make,
        year,
        mileage
    );

    /* Vehicle Name */

    let vehicleName =
    `${year} ${make} ${model}`;

    /* Update Stats */

    vehicleCount++;

    totalGarageValue += estimatedValue;

    document.getElementById("vehicleCount").innerText =
    vehicleCount;

    document.getElementById("garageValue").innerText =
    "$" + totalGarageValue.toLocaleString();

    /* Vehicle Card */

    let vehicleHTML = `

        <div class="vehicleCard">

            <h3>${vehicleName}</h3>

            <p>
                Mileage:
                ${mileage.toLocaleString()} mi
            </p>

            <p>
                Estimated Trade-In Value:
                $${estimatedValue.toLocaleString()}
            </p>

        </div>

    `;

    document.getElementById("garage").innerHTML +=
    vehicleHTML;

    /* Add To Dropdown */

    let option =
    document.createElement("option");

    option.text = vehicleName;

    document.getElementById("vehicleSelect")
    .add(option);

    /* Clear Inputs */

    document.getElementById("make").value = "";

    document.getElementById("model").value = "";

    document.getElementById("year").value = "";

    document.getElementById("mileage").value = "";

}

/* Add Maintenance */

function addService(){

    let vehicle =
    document.getElementById("vehicleSelect").value;

    let service =
    document.getElementById("serviceType").value;

    let currentMileage =
    parseInt(
        document.getElementById("currentMileage").value
    );

    let lastMileage =
    parseInt(
        document.getElementById("lastServiceMileage").value
    );

    if(
        vehicle === "Select Vehicle" ||
        isNaN(currentMileage) ||
        isNaN(lastMileage)
    ){

        alert("Please complete all maintenance fields.");

        return;

    }

    serviceCount++;

    document.getElementById("serviceCount").innerText =
    serviceCount;

    /* Service Intervals */

    let interval = 30000;

    if(service === "Oil Change"){
        interval = 5000;
    }

    if(service === "Timing Belt"){
        interval = 100000;
    }

    if(service === "Spark Plugs"){
        interval = 60000;
    }

    /* Remaining Mileage */

    let milesUsed =
    currentMileage - lastMileage;

    let remaining =
    interval - milesUsed;

    if(remaining < 0){
        remaining = 0;
    }

    /* Progress */

    let progress =
    (milesUsed / interval) * 100;

    if(progress > 100){
        progress = 100;
    }

    /* Status */

    let status = "GOOD";
    let statusClass = "good";

    if(remaining === 0){

        status = "OVERDUE";
        statusClass = "bad";

    }
    else if(remaining < interval * 0.2){

        status = "DUE SOON";
        statusClass = "warning";

    }

    /* Service Card */

    let serviceHTML = `

        <div class="serviceCard">

            <h3>${service}</h3>

            <p>${vehicle}</p>

            <p class="${statusClass}">

                Remaining:
                ${remaining.toLocaleString()} miles

            </p>

            <div class="progress">

                <div
                class="progressFill"
                style="width:${progress}%">

                </div>

            </div>

            <p
            class="${statusClass}"
            style="margin-top:10px;">

                ${status}

            </p>

        </div>

    `;

    document.getElementById("serviceList").innerHTML +=
    serviceHTML;

    /* Clear Inputs */

    document.getElementById("currentMileage").value = "";

    document.getElementById("lastServiceMileage").value = "";

}

</script>

</body>

</html>
