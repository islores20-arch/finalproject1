<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flores Car Care Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter', sans-serif;
    background:#090909;
    color:white;
    overflow-x:hidden;
}

/* Background Effects */

.bg1{
    position:fixed;
    width:500px;
    height:500px;
    background:rgba(255,0,0,0.08);
    border-radius:50%;
    filter:blur(120px);
    top:-150px;
    right:-100px;
    z-index:-2;
}

.bg2{
    position:fixed;
    width:400px;
    height:400px;
    background:rgba(255,255,255,0.03);
    border-radius:50%;
    filter:blur(120px);
    bottom:-150px;
    left:-100px;
    z-index:-2;
}

/* Header */

header{
    width:100%;
    padding:28px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;

    background:rgba(9,9,9,0.75);
    backdrop-filter:blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
    font-size:30px;
    font-weight:700;
    letter-spacing:-1px;
}

.logo span{
    color:#ff2d2d;
}

.tagline{
    color:#9c9c9c;
    font-size:14px;
    margin-top:4px;
}

/* Layout */

.container{
    width:90%;
    max-width:1450px;
    margin:40px auto;
}

/* Stats */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.06);
    backdrop-filter:blur(12px);

    border-radius:24px;
    padding:28px;

    transition:0.35s ease;
}

.stat-card:hover{
    transform:translateY(-6px);
    border-color:rgba(255,0,0,0.25);
    box-shadow:0 10px 30px rgba(255,0,0,0.08);
}

.stat-card h3{
    color:#9f9f9f;
    font-size:14px;
    font-weight:500;
    margin-bottom:15px;
}

.stat-card p{
    font-size:34px;
    font-weight:700;
}

/* Cards */

.main-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
}

.card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.06);

    border-radius:28px;
    padding:30px;

    backdrop-filter:blur(14px);

    transition:0.3s ease;
}

.card:hover{
    border-color:rgba(255,0,0,0.2);
}

.card h2{
    font-size:25px;
    margin-bottom:22px;
}

/* Inputs */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

input, select{
    width:100%;
    padding:15px;
    border:none;
    outline:none;

    border-radius:16px;

    background:#161616;
    color:white;

    font-size:15px;

    transition:0.25s ease;

    border:1px solid transparent;
}

input:focus,
select:focus{
    border:1px solid rgba(255,0,0,0.5);
    transform:scale(1.01);
}

button{
    width:100%;
    margin-top:20px;
    padding:16px;

    border:none;
    border-radius:16px;

    background:linear-gradient(135deg,#ff1a1a,#b30000);

    color:white;
    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s ease;
}

button:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 25px rgba(255,0,0,0.25);
}

/* Garage */

.garage-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:18px;
}

.garage-card{
    background:#121212;

    border:1px solid rgba(255,255,255,0.05);

    border-radius:22px;
    padding:22px;

    position:relative;

    overflow:hidden;

    transition:0.35s ease;
}

.garage-card:hover{
    transform:translateY(-6px);
    border-color:rgba(255,0,0,0.25);
}

.garage-card::before{
    content:"";

    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:4px;

    background:linear-gradient(to right,#ff1a1a,#ff6666);
}

.garage-card img{
    width:85px;
    height:85px;

    object-fit:contain;

    background:white;

    border-radius:14px;
    padding:10px;

    margin-bottom:18px;
}

.garage-card h3{
    margin-bottom:10px;
    font-size:20px;
}

.garage-card p{
    color:#a8a8a8;
    font-size:14px;
    margin-bottom:6px;
}

/* Services */

.service-item{
    background:#121212;

    border:1px solid rgba(255,255,255,0.05);

    border-radius:20px;

    padding:20px;

    margin-top:18px;

    transition:0.3s ease;
}

.service-item:hover{
    transform:translateX(4px);
    border-color:rgba(255,0,0,0.2);
}

.service-item h3{
    margin-bottom:10px;
}

.progress{
    width:100%;
    height:10px;

    background:#222;

    border-radius:30px;

    overflow:hidden;

    margin-top:14px;
}

.progress-bar{
    height:100%;
    border-radius:30px;

    background:linear-gradient(to right,#ff1a1a,#ff6b6b);

    transition:1s ease;
}

/* Status */

.good{
    color:#4dff91;
    font-weight:600;
}

.warning{
    color:#ffd24d;
    font-weight:600;
}

.bad{
    color:#ff5c5c;
    font-weight:600;
}

/* Responsive */

@media(max-width:1000px){

    .main-grid{
        grid-template-columns:1fr;
    }

}

@media(max-width:700px){

    .grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<header>

    <div>

        <div class="logo">
            Flores <span>Car Care</span>
        </div>

        <div class="tagline">
            Never Miss Your Car’s Care Appointment
        </div>

    </div>

</header>

<div class="container">

    <!-- Stats -->

    <div class="stats">

        <div class="stat-card">

            <h3>Total Vehicles</h3>

            <p id="vehicleCount">0</p>

        </div>

        <div class="stat-card">

            <h3>Total Services</h3>

            <p id="serviceCount">0</p>

        </div>

        <div class="stat-card">

            <h3>Total Spent</h3>

            <p id="moneySpent">$0</p>

        </div>

        <div class="stat-card">

            <h3>Garage Value</h3>

            <p id="garageValue">$0</p>

        </div>

    </div>

    <!-- Main -->

    <div class="main-grid">

        <!-- Add Vehicle -->

        <div class="card">

            <h2>Add Vehicle</h2>

            <div class="grid">

                <input type="text" id="make" placeholder="Make">

                <input type="text" id="model" placeholder="Model">

                <input type="number" id="year" placeholder="Year">

                <input type="number" id="tradeValue" placeholder="Trade-In Value">

                <input type="number" id="mileage" placeholder="Mileage">

            </div>

            <button onclick="addVehicle()">
                Add Vehicle To Garage
            </button>

        </div>

        <!-- Add Service -->

        <div class="card">

            <h2>Add Maintenance</h2>

            <div class="grid">

                <select id="vehicleSelect">

                    <option>Select Vehicle</option>

                </select>

                <select id="serviceType">

                    <option>Oil Change</option>
                    <option>Timing Belt</option>
                    <option>Transmission Service</option>
                    <option>Brake Service</option>
                    <option>Coolant Flush</option>
                    <option>Spark Plugs</option>

                </select>

                <input type="number" id="currentMileage" placeholder="Current Mileage">

                <input type="number" id="lastMileage" placeholder="Mileage At Last Service">

            </div>

            <button onclick="addService()">
                Add Maintenance Record
            </button>

        </div>

    </div>

    <!-- Garage -->

    <div class="card" style="margin-top:25px;">

        <h2>Your Garage</h2>

        <div class="garage-grid" id="garageGrid">

        </div>

    </div>

    <!-- Maintenance Timeline -->

    <div class="card" style="margin-top:25px;">

        <h2>Maintenance Timeline</h2>

        <div id="serviceList">

        </div>

    </div>

</div>

<script>

let vehicleCount = 0;
let serviceCount = 0;
let totalGarageValue = 0;

function getLogo(make){

    make = make.toLowerCase();

    const logos = {

        honda:"https://upload.wikimedia.org/wikipedia/commons/7/7b/Honda-logo.svg",

        acura:"https://upload.wikimedia.org/wikipedia/commons/2/27/Acura_logo.svg",

        toyota:"https://upload.wikimedia.org/wikipedia/commons/9/9d/Toyota_carlogo.svg",

        lexus:"https://upload.wikimedia.org/wikipedia/commons/2/2d/Lexus_division_emblem.svg",

        bmw:"https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg",

        audi:"https://upload.wikimedia.org/wikipedia/commons/9/92/Audi-Logo_2016.svg"

    };

    return logos[make] || "https://cdn-icons-png.flaticon.com/512/744/744465.png";

}

function addVehicle(){

    const make = document.getElementById("make").value;

    const model = document.getElementById("model").value;

    const year = document.getElementById("year").value;

    const tradeValue = parseFloat(document.getElementById("tradeValue").value);

    const mileage = document.getElementById("mileage").value;

    if(make === "" || model === "" || year === "" || isNaN(tradeValue)){

        alert("Please fill out all fields.");

        return;

    }

    vehicleCount++;

    totalGarageValue += tradeValue;

    document.getElementById("vehicleCount").innerText = vehicleCount;

    document.getElementById("garageValue").innerText =
    "$" + totalGarageValue.toLocaleString();

    const logo = getLogo(make);

    const vehicleName = `${year} ${make} ${model}`;

    // Garage Card

    const vehicleCard = `

    <div class="garage-card">

        <img src="${logo}">

        <h3>${vehicleName}</h3>

        <p>Mileage: ${parseInt(mileage).toLocaleString()} mi</p>

        <p>Trade-In Value: $${tradeValue.toLocaleString()}</p>

    </div>

    `;

    document.getElementById("garageGrid").innerHTML += vehicleCard;

    // Dropdown

    const option = document.createElement("option");

    option.text = vehicleName;

    document.getElementById("vehicleSelect").add(option);

    // Clear Inputs

    document.getElementById("make").value = "";
    document.getElementById("model").value = "";
    document.getElementById("year").value = "";
    document.getElementById("tradeValue").value = "";
    document.getElementById("mileage").value = "";

}

function addService(){

    const vehicle =
    document.getElementById("vehicleSelect").value;

    const service =
    document.getElementById("serviceType").value;

    const currentMileage =
    parseInt(document.getElementById("currentMileage").value);

    const lastMileage =
    parseInt(document.getElementById("lastMileage").value);

    if(
        vehicle === "Select Vehicle" ||
        isNaN(currentMileage) ||
        isNaN(lastMileage)
    ){

        alert("Please fill out all maintenance fields.");

        return;

    }

    serviceCount++;

    document.getElementById("serviceCount").innerText =
    serviceCount;

    let interval = 30000;

    if(service === "Oil Change") interval = 5000;

    if(service === "Timing Belt") interval = 100000;

    if(service === "Transmission Service") interval = 30000;

    if(service === "Spark Plugs") interval = 60000;

    const usedMiles = currentMileage - lastMileage;

    let remaining = interval - usedMiles;

    let percent = (usedMiles / interval) * 100;

    if(percent > 100){

        percent = 100;

    }

    let status = "";
    let statusClass = "";

    if(remaining <= 0){

        status = "OVERDUE";

        statusClass = "bad";

        remaining = 0;

    }
    else if(remaining <= interval * 0.2){

        status = "DUE SOON";

        statusClass = "warning";

    }
    else{

        status = "GOOD";

        statusClass = "good";

    }

    const serviceCard = `

    <div class="service-item">

        <h3>${service}</h3>

        <p>${vehicle}</p>

        <p style="margin-top:8px;">

            Remaining:

            <span class="${statusClass}">
                ${remaining.toLocaleString()} miles
            </span>

        </p>

        <p style="margin-top:6px;">

            Status:

            <span class="${statusClass}">
                ${status}
            </span>

        </p>

        <div class="progress">

            <div class="progress-bar"
            style="width:${percent}%">

            </div>

        </div>

    </div>

    `;

    document.getElementById("serviceList").innerHTML +=
    serviceCard;

    // Clear

    document.getElementById("currentMileage").value = "";

    document.getElementById("lastMileage").value = "";

}

</script>

</body>
</html>
