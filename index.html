<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flores Car Care Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#0a0a0a;
    color:white;
    overflow-x:hidden;
}

/* Background Glow */

.glow{
    position:fixed;
    width:600px;
    height:600px;
    background:rgba(255,0,0,0.12);
    filter:blur(140px);
    border-radius:50%;
    top:-200px;
    right:-200px;
    z-index:-1;
}

/* Header */

header{
    padding:25px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;

    position:sticky;
    top:0;

    background:rgba(10,10,10,0.75);
    backdrop-filter:blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.05);

    z-index:999;
}

.logo{
    font-size:30px;
    font-weight:700;
}

.logo span{
    color:#ff2d2d;
}

.tagline{
    color:#9f9f9f;
    font-size:13px;
}

/* Layout */

.container{
    width:90%;
    max-width:1400px;
    margin:40px auto;
}

/* Stats */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.stat{
    background:#141414;
    padding:20px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.05);

    transition:0.3s ease;
}

.stat:hover{
    transform:translateY(-3px);
    border-color:rgba(255,0,0,0.3);
}

.stat h3{
    color:#9f9f9f;
    font-size:13px;
    margin-bottom:10px;
}

.stat p{
    font-size:30px;
    font-weight:700;
}

/* Main Grid */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* Cards */

.card{
    background:#141414;
    border:1px solid rgba(255,255,255,0.05);

    border-radius:22px;

    padding:24px;
}

.card h2{
    margin-bottom:18px;
}

/* Inputs */

input,
select{
    width:100%;
    padding:14px;

    margin-top:12px;

    border:none;
    outline:none;

    border-radius:14px;

    background:#1d1d1d;
    color:white;

    transition:0.2s ease;
}

input:focus,
select:focus{
    border:1px solid rgba(255,0,0,0.5);
}

/* Button */

button{
    width:100%;

    padding:15px;

    margin-top:18px;

    border:none;
    border-radius:14px;

    background:linear-gradient(135deg,#ff1a1a,#a80000);

    color:white;

    font-size:15px;
    font-weight:600;

    cursor:pointer;

    transition:0.25s ease;
}

button:hover{
    transform:translateY(-2px);
}

/* Garage */

.garage{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-top:18px;
}

.vehicle{
    background:#111;

    border-radius:18px;

    padding:18px;

    border:1px solid rgba(255,255,255,0.05);

    transition:0.3s ease;
}

.vehicle:hover{
    transform:translateY(-4px);
    border-color:#ff2d2d;
}

.vehicle h3{
    margin-bottom:10px;
    font-size:18px;
}

.vehicle p{
    color:#aaa;
    font-size:14px;
    margin-top:5px;
}

/* Service */

.service{
    background:#111;

    padding:18px;

    border-radius:16px;

    margin-top:15px;

    border:1px solid rgba(255,255,255,0.05);
}

.progress{
    width:100%;
    height:8px;

    background:#222;

    border-radius:20px;

    overflow:hidden;

    margin-top:10px;
}

.fill{
    height:100%;
    background:linear-gradient(to right,#ff1a1a,#ff6666);
}

/* Status */

.good{
    color:#4dff91;
}

.warn{
    color:#ffd24d;
}

.bad{
    color:#ff5c5c;
}

/* Mobile */

@media(max-width:900px){

    .grid{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="glow"></div>

<header>

    <div>

        <div class="logo">
            Flores <span>Car Care</span>
        </div>

        <div class="tagline">
            Never Miss Your Car’s Care Appointment
        </div>

    </div>

</header>

<div class="container">

<!-- Stats -->

<div class="stats">

    <div class="stat">
        <h3>Total Vehicles</h3>
        <p id="vehicleCount">0</p>
    </div>

    <div class="stat">
        <h3>Total Services</h3>
        <p id="serviceCount">0</p>
    </div>

    <div class="stat">
        <h3>Garage Value</h3>
        <p id="garageValue">$0</p>
    </div>

</div>

<!-- Main Grid -->

<div class="grid">

    <!-- Vehicle -->

    <div class="card">

        <h2>Add Vehicle</h2>

        <input type="text" id="make" placeholder="Make">

        <input type="text" id="model" placeholder="Model">

        <input type="number" id="year" placeholder="Year">

        <input type="number" id="mileage" placeholder="Mileage">

        <button onclick="addVehicle()">
            Add Vehicle
        </button>

    </div>

    <!-- Maintenance -->

    <div class="card">

        <h2>Add Maintenance</h2>

        <select id="vehicleSelect">

            <option>Select Vehicle</option>

        </select>

        <select id="serviceType">

            <option>Oil Change</option>
            <option>Timing Belt</option>
            <option>Transmission Service</option>
            <option>Brakes</option>
            <option>Spark Plugs</option>

        </select>

        <input type="number"
        id="currentMileage"
        placeholder="Current Mileage">

        <input type="number"
        id="lastMileage"
        placeholder="Mileage At Last Service">

        <button onclick="addService()">
            Add Maintenance
        </button>

    </div>

</div>

<!-- Garage -->

<div class="card" style="margin-top:25px;">

    <h2>Your Garage</h2>

    <div class="garage" id="garage"></div>

</div>

<!-- Maintenance Timeline -->

<div class="card" style="margin-top:25px;">

    <h2>Maintenance Timeline</h2>

    <div id="services"></div>

</div>

</div>

<script>

/* DATA */

let vehicles = [];
let services = [];

/* LOAD STORAGE */

window.onload = function(){

    if(localStorage.getItem("vehicles")){

        vehicles =
        JSON.parse(localStorage.getItem("vehicles"));

        renderVehicles();

    }

    if(localStorage.getItem("services")){

        services =
        JSON.parse(localStorage.getItem("services"));

        renderServices();

    }

}

/* SAVE */

function save(){

    localStorage.setItem(
        "vehicles",
        JSON.stringify(vehicles)
    );

    localStorage.setItem(
        "services",
        JSON.stringify(services)
    );

}

/* SMART VALUE ESTIMATOR */

function estimateValue(make, model, year, mileage){

    make = make.toLowerCase();

    let currentYear = 2026;

    let age = currentYear - year;

    let base = 22000;

    /* Luxury */

    if(
        make.includes("acura") ||
        make.includes("lexus") ||
        make.includes("bmw") ||
        make.includes("audi") ||
        make.includes("infiniti")
    ){

        base = 32000;

    }

    /* Economy */

    if(
        make.includes("toyota") ||
        make.includes("honda")
    ){

        base = 26000;

    }

    /* Sports Models */

    if(
        model.toLowerCase().includes("type s") ||
        model.toLowerCase().includes("type-s") ||
        model.toLowerCase().includes("si") ||
        model.toLowerCase().includes("m3") ||
        model.toLowerCase().includes("supra")
    ){

        base += 12000;

    }

    /* Depreciation */

    base -= age * 1200;

    base -= mileage * 0.05;

    if(base < 2500){

        base = 2500;

    }

    return Math.round(base);

}

/* ADD VEHICLE */

function addVehicle(){

    let make =
    document.getElementById("make").value;

    let model =
    document.getElementById("model").value;

    let year =
    parseInt(document.getElementById("year").value);

    let mileage =
    parseInt(document.getElementById("mileage").value);

    if(
        !make ||
        !model ||
        !year ||
        !mileage
    ){

        alert("Please fill out all fields.");

        return;

    }

    /* AUTO VALUE CALCULATION */

    let estimatedValue =
    estimateValue(make, model, year, mileage);

    let vehicle = {

        make,
        model,
        year,
        mileage,
        estimatedValue

    };

    vehicles.push(vehicle);

    save();

    renderVehicles();

    /* Clear Inputs */

    document.getElementById("make").value = "";

    document.getElementById("model").value = "";

    document.getElementById("year").value = "";

    document.getElementById("mileage").value = "";

}

/* RENDER VEHICLES */

function renderVehicles(){

    let garage =
    document.getElementById("garage");

    let select =
    document.getElementById("vehicleSelect");

    garage.innerHTML = "";

    select.innerHTML =
    "<option>Select Vehicle</option>";

    let totalValue = 0;

    vehicles.forEach((car,index)=>{

        totalValue += car.estimatedValue;

        garage.innerHTML += `

        <div class="vehicle">

            <h3>
                ${car.year} ${car.make} ${car.model}
            </h3>

            <p>
                Mileage:
                ${car.mileage.toLocaleString()} mi
            </p>

            <p>
                Estimated Value:
                $${car.estimatedValue.toLocaleString()}
            </p>

        </div>

        `;

        let option =
        document.createElement("option");

        option.value = index;

        option.text =
        `${car.year} ${car.make} ${car.model}`;

        select.add(option);

    });

    document.getElementById("vehicleCount")
    .innerText = vehicles.length;

    document.getElementById("garageValue")
    .innerText =
    "$" + totalValue.toLocaleString();

}

/* ADD SERVICE */

function addService(){

    let vehicleIndex =
    document.getElementById("vehicleSelect").value;

    let type =
    document.getElementById("serviceType").value;

    let currentMileage =
    parseInt(document.getElementById("currentMileage").value);

    let lastMileage =
    parseInt(document.getElementById("lastMileage").value);

    if(
        vehicleIndex === "Select Vehicle" ||
        !currentMileage ||
        !lastMileage
    ){

        alert("Please fill out all maintenance fields.");

        return;

    }

    let interval = 30000;

    if(type === "Oil Change") interval = 5000;

    if(type === "Timing Belt") interval = 100000;

    if(type === "Spark Plugs") interval = 60000;

    let used =
    currentMileage - lastMileage;

    let remaining =
    interval - used;

    let percent =
    Math.min((used / interval) * 100,100);

    let status = "GOOD";
    let statusClass = "good";

    if(remaining <= 0){

        remaining = 0;

        status = "OVERDUE";

        statusClass = "bad";

    }
    else if(remaining <= interval * 0.2){

        status = "DUE SOON";

        statusClass = "warn";

    }

    let service = {

        vehicle:
        vehicles[vehicleIndex],

        type,
        remaining,
        percent,
        status,
        statusClass

    };

    services.push(service);

    save();

    renderServices();

}

/* RENDER SERVICES */

function renderServices(){

    let container =
    document.getElementById("services
