<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flores Car Care Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#0b0b0b;
    color:white;
    overflow-x:hidden;
}

/* Background Glow */

.glow1{
    position:fixed;
    width:500px;
    height:500px;
    background:rgba(255,0,0,0.15);
    filter:blur(140px);
    border-radius:50%;
    top:-150px;
    right:-100px;
    z-index:-1;
}

/* Header */

header{
    padding:25px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(10,10,10,0.8);

    position:sticky;
    top:0;

    backdrop-filter:blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
    font-size:30px;
    font-weight:700;
}

.logo span{
    color:#ff2d2d;
}

.tagline{
    color:#999;
    font-size:13px;
}

/* Layout */

.container{
    width:90%;
    max-width:1350px;
    margin:40px auto;
}

/* Stats */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-bottom:25px;
}

.stat{
    background:#141414;
    border-radius:18px;
    padding:22px;
    border:1px solid rgba(255,255,255,0.05);
}

.stat h3{
    color:#999;
    font-size:13px;
}

.stat p{
    font-size:30px;
    margin-top:10px;
    font-weight:700;
}

/* Main Grid */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{
    background:#141414;
    border-radius:20px;
    padding:24px;
    border:1px solid rgba(255,255,255,0.05);
}

.card h2{
    margin-bottom:15px;
}

/* Inputs */

input,
select{
    width:100%;
    padding:14px;
    margin-top:10px;

    border:none;
    outline:none;

    border-radius:12px;

    background:#1d1d1d;
    color:white;

    transition:0.2s;
}

input:focus,
select:focus{
    border:1px solid #ff2d2d;
}

/* Buttons */

button{
    width:100%;
    padding:14px;
    margin-top:15px;

    border:none;
    border-radius:12px;

    background:linear-gradient(135deg,#ff1a1a,#b30000);

    color:white;
    font-weight:600;

    cursor:pointer;

    transition:0.25s;
}

button:hover{
    transform:translateY(-2px);
}

/* Garage */

.garage{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-top:15px;
}

.vehicle{
    background:#111;
    border-radius:16px;
    padding:18px;

    border:1px solid rgba(255,255,255,0.05);

    transition:0.25s;
}

.vehicle:hover{
    transform:translateY(-4px);
    border-color:#ff2d2d;
}

.vehicle h3{
    margin-bottom:8px;
}

.vehicle p{
    color:#aaa;
    font-size:14px;
    margin-top:5px;
}

/* Services */

.service{
    margin-top:15px;
    background:#111;
    padding:16px;
    border-radius:16px;

    border:1px solid rgba(255,255,255,0.05);
}

.bar{
    width:100%;
    height:8px;
    background:#222;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px;
}

.fill{
    height:100%;
    background:linear-gradient(90deg,#ff1a1a,#ff6666);
}

.good{
    color:#4dff91;
}

.warn{
    color:#ffd24d;
}

.bad{
    color:#ff4d4d;
}

/* Mobile */

@media(max-width:900px){

    .grid{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="glow1"></div>

<header>

    <div>

        <div class="logo">
            Flores <span>Car Care</span>
        </div>

        <div class="tagline">
            Never Miss Your Car's Care Appointment
        </div>

    </div>

</header>

<div class="container">

<!-- Stats -->

<div class="stats">

    <div class="stat">
        <h3>Total Vehicles</h3>
        <p id="vehicleCount">0</p>
    </div>

    <div class="stat">
        <h3>Total Services</h3>
        <p id="serviceCount">0</p>
    </div>

    <div class="stat">
        <h3>Garage Value</h3>
        <p id="garageValue">$0</p>
    </div>

</div>

<!-- Main Grid -->

<div class="grid">

    <!-- Add Vehicle -->

    <div class="card">

        <h2>Add Vehicle</h2>

        <input type="text" id="make" placeholder="Make">

        <input type="text" id="model" placeholder="Model">

        <input type="number" id="year" placeholder="Year">

        <input type="number" id="mileage" placeholder="Mileage">

        <button onclick="addVehicle()">
            Add Vehicle
        </button>

    </div>

    <!-- Add Service -->

    <div class="card">

        <h2>Add Maintenance</h2>

        <select id="vehicleSelect">
            <option>Select Vehicle</option>
        </select>

        <select id="serviceType">
            <option>Oil Change</option>
            <option>Timing Belt</option>
            <option>Transmission Service</option>
            <option>Brake Service</option>
            <option>Spark Plugs</option>
        </select>

        <input type="number" id="currentMileage" placeholder="Current Mileage">

        <input type="number" id="lastMileage" placeholder="Mileage At Last Service">

        <button onclick="addService()">
            Add Maintenance
        </button>

    </div>

</div>

<!-- Garage -->

<div class="card" style="margin-top:20px;">

    <h2>Your Garage</h2>

    <div class="garage" id="garage">

    </div>

</div>

<!-- Maintenance -->

<div class="card" style="margin-top:20px;">

    <h2>Maintenance Timeline</h2>

    <div id="services">

    </div>

</div>

</div>

<script>

let vehicleCount = 0;
let serviceCount = 0;
let garageValue = 0;

/* Estimate Vehicle Value */

function estimateValue(make,year,mileage){

    let value = 22000;

    const premiumBrands = [
        "bmw",
        "audi",
        "lexus",
        "acura",
        "infiniti"
    ];

    if(
        premiumBrands.includes(make.toLowerCase())
    ){
        value += 8000;
    }

    let age = 2026 - year;

    value -= age * 1200;

    value -= mileage * 0.05;

    if(value < 2500){
        value = 2500;
    }

    return Math.round(value);

}

/* Add Vehicle */

function addVehicle(){

    let make =
    document.getElementById("make").value;

    let model =
    document.getElementById("model").value;

    let year =
    parseInt(document.getElementById("year").value);

    let mileage =
    parseInt(document.getElementById("mileage").value);

    if(
        !make ||
        !model ||
        !year ||
        !mileage
    ){

        alert("Please fill all fields.");

        return;

    }

    let value =
    estimateValue(make,year,mileage);

    let vehicleName =
    `${year} ${make} ${model}`;

    vehicleCount++;

    garageValue += value;

    document.getElementById("vehicleCount").innerText =
    vehicleCount;

    document.getElementById("garageValue").innerText =
    "$" + garageValue.toLocaleString();

    /* Garage Card */

    document.getElementById("garage").innerHTML += `

        <div class="vehicle">

            <h3>${vehicleName}</h3>

            <p>Mileage: ${mileage.toLocaleString()} mi</p>

            <p>
                Estimated Value:
                $${value.toLocaleString()}
            </p>

        </div>

    `;

    /* Add To Dropdown */

    let option =
    document.createElement("option");

    option.text = vehicleName;

    document.getElementById("vehicleSelect")
    .add(option);

    /* Clear Inputs */

    document.getElementById("make").value = "";

    document.getElementById("model").value = "";

    document.getElementById("year").value = "";

    document.getElementById("mileage").value = "";

}

/* Add Service */

function addService(){

    let vehicle =
    document.getElementById("vehicleSelect").value;

    let service =
    document.getElementById("serviceType").value;

    let currentMileage =
    parseInt(document.getElementById("currentMileage").value);

    let lastMileage =
    parseInt(document.getElementById("lastMileage").value);

    if(
        vehicle === "Select Vehicle" ||
        !currentMileage ||
        !lastMileage
    ){

        alert("Fill all maintenance fields.");

        return;

    }

    serviceCount++;

    document.getElementById("serviceCount").innerText =
    serviceCount;

    let interval = 30000;

    if(service === "Oil Change"){
        interval = 5000;
    }

    if(service === "Timing Belt"){
        interval = 100000;
    }

    if(service === "Spark Plugs"){
        interval = 60000;
    }

    let used =
    currentMileage - lastMileage;

    let remaining =
    interval - used;

    if(remaining < 0){
        remaining = 0;
    }

    let percent =
    Math.min((used / interval) * 100,100);

    let status = "GOOD";
    let className = "good";

    if(remaining === 0){

        status = "OVERDUE";
        className = "bad";

    }
    else if(remaining < interval * 0.2){

        status = "DUE SOON";
        className = "warn";

    }

    document.getElementById("services").innerHTML += `

        <div class="service">

            <h3>${service}</h3>

            <p>${vehicle}</p>

            <p class="${className}">
                Remaining:
                ${remaining.toLocaleString()} miles
            </p>

            <div class="bar">

                <div
                class="fill"
                style="width:${percent}%">

                </div>

            </div>

            <p class="${className}" style="margin-top:10px;">
                ${status}
            </p>

        </div>

    `;

    document.getElementById("currentMileage").value = "";

    document.getElementById("lastMileage").value = "";

}

</script>

</body>

</html>
